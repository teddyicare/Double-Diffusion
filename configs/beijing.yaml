# config/beijing.yaml
# Beijing KDD 2017-2018 Air Quality Dataset  (N=32 graph after filtering, C=6)
#
# NOT THE SOURCE OF TRUTH. The canonical DD/EDM runs are CLI-driven (industry_validation/
# run_validation.py + hpc_wrappers/*) and the baselines hard-override future_len in
# run_baselines.py, so this file is not read by the canonical pipeline. The values below are
# aligned to the paper config for reference only.
# Authoritative paper config: history_len 12, future_len 24, d_model 64, n_blocks 4,
# patience 20, k auto-fitted (kfit_l2_hpc.json), test K=32 / val K=1.

# Data
history_len: 12
future_len:  24
num_workers: 4

# Training
batch_size:   32
epochs:       200
lr:           0.001
weight_decay: 0.0
patience:     20     # early stopping patience (epochs without val MAE improvement)

# Diffusion schedule (shared across DDPM models, best from grid search)
n_diffusion_steps: 100
beta_start:        0.0001
beta_end:          0.2

# Double-Diffusion specific
d_model:    64
n_blocks:   4
expansion:  4
dropout:    0.1
k:          0.1     # fitted k* (kfit_l2_hpc.json); auto-loaded at runtime, not from this file
n_samples:  32      # K samples at test time; 1 during validation for speed

# Ablation / hyperparameter sweep overrides applied via CLI
